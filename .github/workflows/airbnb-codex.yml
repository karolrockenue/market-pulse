name: Airbnb Codex Scraper

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily (06:00 Poland CEST)
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: airbnb-codex
        run: npm install

      - name: Run Airbnb scraper (Archanes)
        working-directory: airbnb-codex
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: node index.js archanes
