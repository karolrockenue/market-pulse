<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Performance Metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* All page furniture (dark bar, gradient strip, page number, property
       name) is rendered by Playwright's header/footer templates — NOT in
       this body. Margins are owned exclusively by Playwright's `margin`
       option so there's nothing here that can conflict. */
    @page { size: A4 portrait; }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
      color: #1A1A1A;
      background: #FFFFFF;
      font-size: 10.5px;
      line-height: 1.35;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      position: relative;
    }

    /* Page-1 header overlay. The headerTemplate SVG repeats on every page
       but leaves a 1px white sliver on the right edge (Chromium print
       rasterizer asymmetric sub-pixel rounding — can't be fixed via DOM
       tricks). This body-rendered overlay sits over the headerTemplate
       area on page 1 and paints the dark bar edge-to-edge. It's absolute-
       positioned at top:-22mm so it lands in the reserved header region.
       Only renders on page 1 (body content, not per-page). */
    .page1-header-overlay {
      position: absolute;
      top: -26mm;
      left: 0;
      right: 0;
      height: 22mm;
      background-color: #14181D;
      display: flex;
      align-items: center;
      padding: 0 18mm;
      color: #F3F5F7;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .page1-header-overlay .logo { display: flex; align-items: center; flex: 0 0 auto; }
    .page1-header-overlay .bracket-l { color: #38C6BA; font-size: 20px; font-weight: 300; line-height: 1; }
    .page1-header-overlay .bracket-r { color: #C8A66E; font-size: 20px; font-weight: 300; line-height: 1; }
    .page1-header-overlay .wordmark { font-size: 10.5px; font-weight: 700; letter-spacing: 1.4px; padding: 0 8px; line-height: 1; }
    .page1-header-overlay .right-label { margin-left: auto; color: #7A8494; font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; font-weight: 500; }

    /* Side gutters live inside body. Top padding guards against Chromium
       letting the headerTemplate bleed into the body area — the first meta
       row was being rendered behind the dark bar without this. */
    .content-wrap { padding: 6mm 12mm 0 12mm; }

    /* Metadata block */
    .meta-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #E5E5E0;
      font-size: 11px;
    }
    .meta-row .k { color: #6B7280; }
    .meta-row .v { color: #1A1A1A; }

    .section-label {
      font-size: 10px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 8px 0;
    }

    /* Table */
    table.report { width: 100%; border-collapse: collapse; }
    table.report thead { display: table-header-group; }
    table.report tr { break-inside: avoid; page-break-inside: avoid; }
    table.report th {
      text-align: right;
      padding: 4px 8px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6B7280;
      font-weight: 500;
      border-bottom: 1px solid #E5E5E0;
      background: #FFFFFF;
    }
    table.report td {
      text-align: right;
      padding: 4px 8px;
      font-size: 10.5px;
      color: #1A1A1A;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid #E5E5E0;
    }
    table.report th.l, table.report td.l { text-align: left; }
    table.report tbody tr:nth-child(even) td { background: #F3F3EE; }
    table.report tr.totals td { padding: 8px 8px; font-weight: 500; border-top: 2px solid #E5E5E0; border-bottom: none; background: #FFFFFF !important; }
    .dow-muted { color: #6B7280; }
    .dow-weekend { color: #1A1A1A; }

    .empty { padding: 48px 0; text-align: center; color: #6B7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="page1-header-overlay">
    <div class="logo">
      <span class="bracket-l">(</span>
      <span class="wordmark">MARKET PULSE</span>
      <span class="bracket-r">)</span>
    </div>
    <div class="right-label">PERFORMANCE METRICS</div>
  </div>
  <div class="content-wrap">
    <div id="meta"></div>
    <div class="section-label">Performance Data</div>
    <div id="table-wrap"></div>
  </div>

  <script>
    const METRIC_LABELS = {
      "occupancy": "Occupancy",
      "adr": "ADR",
      "revpar": "RevPAR",
      "total-revenue": "Total Revenue",
      "rooms-sold": "Rooms Sold",
      "rooms-unsold": "Rooms Unsold",
      "market-occupancy": "Market Occ",
      "market-adr": "Market ADR"
    };
    const VOLUME_METRICS = new Set(["total-revenue", "rooms-sold", "rooms-unsold"]);

    function esc(s) { return String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

    function formatValue(metric, value, symbol) {
      const v = Number(value) || 0;
      if (metric.indexOf("occupancy") !== -1) return (v * 100).toFixed(1) + "%";
      if (metric.indexOf("adr") !== -1 || metric.indexOf("revenue") !== -1 || metric.indexOf("revpar") !== -1) {
        return symbol + v.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      return v.toLocaleString("en-GB");
    }

    function formatPeriod(period, granularity) {
      if (!period) return { main: "—" };
      if (granularity === "monthly") {
        const d = new Date(period + "T12:00:00");
        return { main: d.toLocaleDateString("en-GB", { month: "long", year: "numeric" }) };
      }
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(period);
      if (!m) return { main: period };
      const d = new Date(Date.UTC(Number(m[1]), Number(m[2]) - 1, Number(m[3])));
      const dow = d.toLocaleDateString("en-GB", { weekday: "short", timeZone: "UTC" });
      return { main: m[3] + "/" + m[2] + "/" + m[1], dow: dow };
    }

    function formatDateRange(start, end) {
      const opts = { day: "numeric", month: "short", year: "numeric" };
      try {
        const s = new Date(start + "T12:00:00").toLocaleDateString("en-GB", opts);
        const e = new Date(end + "T12:00:00").toLocaleDateString("en-GB", opts);
        return s + " — " + e;
      } catch (_err) {
        return start + " — " + end;
      }
    }

    function computeTotals(rows, selectedMetrics) {
      const out = {};
      if (!rows || !rows.length) return out;
      for (let i = 0; i < selectedMetrics.length; i++) {
        const m = selectedMetrics[i];
        let sum = 0;
        for (let j = 0; j < rows.length; j++) sum += Number(rows[j][m]) || 0;
        out[m] = VOLUME_METRICS.has(m) ? sum : (sum / rows.length);
      }
      return out;
    }

    window.renderReport = async function(data) {
      try {
        const rows = Array.isArray(data.rows) ? data.rows : [];
        const selectedMetrics = Array.isArray(data.selectedMetrics) ? data.selectedMetrics : [];
        const granularity = data.granularity || "daily";
        const symbol = data.currencySymbol || "£";
        const displayTotals = !!data.displayTotals;
        const showDow = granularity === "daily";

        const meta = [
          { k: "Property", v: data.propertyName || "—" },
          { k: "Period", v: formatDateRange(data.startDate, data.endDate) },
          { k: "Granularity", v: (granularity.charAt(0).toUpperCase() + granularity.slice(1)) },
          { k: "Generated", v: data.generatedAt || "" }
        ];
        document.getElementById("meta").innerHTML = meta
          .map((m) => "<div class=\"meta-row\"><div class=\"k\">" + esc(m.k) + "</div><div class=\"v\">" + esc(m.v) + "</div></div>")
          .join("");

        let html = "<table class=\"report\"><thead><tr>";
        html += "<th class=\"l\">Date</th>";
        if (showDow) html += "<th>DOW</th>";
        for (let i = 0; i < selectedMetrics.length; i++) {
          html += "<th>" + esc(METRIC_LABELS[selectedMetrics[i]] || selectedMetrics[i]) + "</th>";
        }
        html += "</tr></thead><tbody>";

        if (!rows.length) {
          html += "</tbody></table><div class=\"empty\">No data for the selected period.</div>";
        } else {
          for (let i = 0; i < rows.length; i++) {
            const r = rows[i];
            const p = formatPeriod(r.period, granularity);
            const isWeekend = p.dow === "Sat" || p.dow === "Sun";
            html += "<tr>";
            html += "<td class=\"l\">" + esc(p.main) + "</td>";
            if (showDow) html += "<td class=\"" + (isWeekend ? "dow-weekend" : "dow-muted") + "\">" + esc(p.dow || "") + "</td>";
            for (let j = 0; j < selectedMetrics.length; j++) {
              const m = selectedMetrics[j];
              html += "<td>" + esc(formatValue(m, r[m], symbol)) + "</td>";
            }
            html += "</tr>";
          }
          if (displayTotals) {
            const tot = computeTotals(rows, selectedMetrics);
            html += "<tr class=\"totals\">";
            html += "<td class=\"l\">Totals / Avg</td>";
            if (showDow) html += "<td></td>";
            for (let j = 0; j < selectedMetrics.length; j++) {
              const m = selectedMetrics[j];
              html += "<td>" + esc(formatValue(m, tot[m] || 0, symbol)) + "</td>";
            }
            html += "</tr>";
          }
          html += "</tbody></table>";
        }
        document.getElementById("table-wrap").innerHTML = html;

        // Race fonts.ready against a hard 1500ms cap. On Railway, the
        // outbound fetch to fonts.googleapis.com can stall and never
        // resolve, hanging renderReport so pdf.utils.js times out waiting
        // for body.ready and 500s. System fallbacks (Helvetica Neue, Arial)
        // are acceptable — Archivo is a nice-to-have, not load-bearing.
        if (document.fonts && document.fonts.ready) {
          try {
            await Promise.race([
              document.fonts.ready,
              new Promise((resolve) => setTimeout(resolve, 1500)),
            ]);
          } catch (_err) { /* ignore */ }
        }
        document.body.classList.add("ready");
      } catch (e) {
        console.error("Error in window.renderReport:", e);
        document.body.classList.add("ready");
      }
    };

    document.body.classList.add("script-ready");
  </script>
</body>
</html>
