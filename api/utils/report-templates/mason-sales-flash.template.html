<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mason &amp; Fifth — Sales Flash · PDF mockup (v1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ background:#E6E6E3; font-family:'Inter',sans-serif; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

  /* neutral monochrome palette (colour deferred) */
  :root{
    --text:#1A1A1A; --muted:#6B7280; --faint:#9AA0A6; --border:#E5E7EB;
    --segShort:#7BAFD4; --segMid:#50708F; --segLong:#1E3A57; --segOther:#BA5A54;
    --hdrFont:'Archivo','Helvetica Neue',Arial,sans-serif;
  }

  .toolbar{ position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:14px;
    background:#14181D; color:#F3F5F7; padding:10px 20px; box-shadow:0 2px 10px rgba(0,0,0,.35);}
  .toolbar .cap{ font:600 11px/1 'Inter'; color:#7A8494; letter-spacing:.05em; text-transform:uppercase;}
  .toolbar .grow{ flex:1; }

  /* ===== Page frame (landscape A4) ===== */
  .deck{ padding:26px 0 60px; }
  .page{ width:297mm; height:210mm; margin:0 auto 22px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; box-shadow:0 8px 30px rgba(0,0,0,.3); background:#fff; color:var(--text); }

  /* header — white, Mason & Fifth logo */
  .pg-header{ flex:0 0 auto; height:15mm; display:flex; align-items:center; padding:0 14mm; background:#fff; border-bottom:1px solid var(--border);}
  .pg-header .mf-logo{ height:4.4mm; width:auto; display:block;}
  .pg-header .rl{ margin-left:auto; text-align:right; font-family:var(--hdrFont); font-size:9px; letter-spacing:.9px; text-transform:uppercase; font-weight:600; color:var(--muted);}
  .pg-header .rl small{ display:block; font-size:8px; color:var(--faint); letter-spacing:.6px; margin-top:2px; font-weight:500;}

  /* footer — white, hairline, powered-by note (no gradient strip) */
  .pg-footer{ flex:0 0 auto; height:9mm; display:flex; align-items:center; justify-content:space-between; padding:0 14mm;
    font-family:var(--hdrFont); font-size:9px; color:var(--muted); letter-spacing:.05em; border-top:1px solid var(--border);}
  .pg-footer .powered{ color:var(--faint);}
  .pg-footer .powered b{ color:var(--text); font-weight:600;}

  /* body */
  .pg-body{ flex:1 1 auto; padding:9mm 14mm 5mm; overflow:hidden; }
  .sec + .sec{ margin-top:20px; }

  .page-title{ font-size:17px; font-weight:600; letter-spacing:-.015em; margin:0 0 4px; }
  .meta-strip{ display:flex; gap:30px; padding-bottom:12px; margin-bottom:18px; border-bottom:1px solid var(--border); }
  .meta-strip .k{ font-size:8px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); font-weight:600;}
  .meta-strip .v{ font-size:10.5px; font-weight:600; margin-top:3px;}
  /* single-line summary head (title + compact meta) */
  .summary-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; padding-bottom:11px; margin-bottom:20px; border-bottom:1px solid var(--border); }
  .summary-head .page-title{ margin:0; }
  .meta-inline{ display:flex; gap:24px; flex:0 0 auto; }
  .meta-inline .mi{ font-family:var(--numFont,'Inter'); font-size:11px; font-weight:600; color:var(--text); white-space:nowrap; }
  .meta-inline .mi i{ font-style:normal; text-transform:uppercase; letter-spacing:.08em; font-size:8px; color:var(--muted); font-weight:600; margin-right:6px; }

  .section-label{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.09em; font-weight:600; margin:0 0 9px;}
  .section-label .sub{ text-transform:none; letter-spacing:0; font-weight:400; color:var(--faint); }

  /* cards */
  .cards{ display:flex; gap:14px; }
  .card{ flex:1; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff;}
  .card.report{ border:1.5px solid var(--text);}
  .card .ch{ display:flex; align-items:baseline; justify-content:space-between; padding:7px 11px; border-bottom:1px solid var(--border); background:transparent;}
  .card.report .ch{ background:#F3F4F6;}
  .card .ch .mn{ font-size:11.5px; font-weight:600;}
  .card .ch .tag{ font-size:7px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); border:1px solid var(--border); border-radius:99px; padding:2px 7px; background:#fff; font-weight:600;}
  .card .cb{ padding:8px 11px; }
  .card .big{ display:flex; gap:9px; padding:3px 0 9px; }
  .card .big .b{ flex:1; }
  .card .big .bl{ font-size:7px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600;}
  .card .big .bv{ font-size:16px; font-weight:600; line-height:1.1; letter-spacing:-.02em; margin-top:2px;}
  .kv{ display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; border-bottom:1px solid #F1F2F4;}
  .kv:last-child{ border-bottom:0;}
  .kv .k{ font-size:9px; color:var(--muted); font-weight:400;}
  .kv .v{ font-size:10px; font-weight:500;}
  .kv .v small{ font-size:7.5px; color:var(--faint); font-weight:400; margin-left:4px;}
  .seg-dot{ display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:6px; vertical-align:middle;}

  /* layout helpers */
  .summary-grid{ display:grid; grid-template-columns:68% 32%; gap:22px; }
  .row{ display:flex; gap:14px; align-items:flex-start; }
  .row > *{ min-width:0; }
  .stack{ display:flex; flex-direction:column; gap:11px; }
  .grow{ flex:1; }
  .twocol{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }

  /* tables */
  table.rep{ width:100%; border-collapse:collapse; }
  table.rep th{ text-align:right; padding:6px 8px; font-size:7px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border); white-space:nowrap;}
  table.rep td{ text-align:right; padding:5px 8px; font-size:9px; color:var(--text); font-variant-numeric:tabular-nums; border-bottom:1px solid #F1F2F4; white-space:nowrap;}
  table.rep th.l,table.rep td.l{ text-align:left;}
  table.rep tbody tr:nth-child(even) td{ background:#FAFAFA;}
  table.rep tr.tot td{ padding:7px 8px; font-weight:700; border-top:1.5px solid var(--border); border-bottom:none; background:#fff!important;}
  table.rep tr.sub td{ font-weight:600; background:#fbfbfb;}
  table.rep .strong{ font-weight:700;}
  /* Pacing Report — wide per-service grid (app-faithful) */
  table.pacing th, table.pacing td{ padding:2.5px 5px; font-size:7.5px;}
  table.pacing tbody tr:nth-child(even) td{ background:transparent;}
  table.pacing tr.svc td{ padding:8px 5px 3px; font-weight:700; font-size:8px; text-transform:uppercase; letter-spacing:.05em; color:var(--text); border-bottom:1px solid var(--border);}
  table.pacing tr.varr td{ border-bottom:1px solid var(--border);}
  table.rep .muted{ color:var(--muted); font-weight:400;}
  .pos{ color:var(--text);} .neg{ color:var(--text);}   /* monochrome deltas for now */

  .source-bar{ display:flex; height:34px; border-radius:6px; overflow:hidden; border:1px solid var(--border);}
  .source-bar .d{ background:#0F4C81; color:#fff;}
  .source-bar .i{ background:#B4C7DA; color:#1A1A1A;}
  .source-bar > div{ display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; letter-spacing:.02em;}

  .chart-card{ border:1px solid var(--border); border-radius:8px; padding:9px 11px; }
  .chart-card .ct{ font-size:8px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:5px; font-weight:600;}
  .legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:8px; color:var(--muted); margin-top:7px;}
  .legend span{ display:inline-flex; align-items:center;}
  .note-box{ font-size:8px; color:var(--faint); margin-top:8px; line-height:1.5;}

  /* ===== Page 1 (summary) generous spacing ===== */
  .p-summary .pg-body{ padding:12mm 16mm 7mm; }
  .p-summary .meta-strip{ padding-bottom:13px; margin-bottom:22px; }
  .p-summary .cards{ margin-bottom:24px; }
  .p-summary .card .ch{ padding:8px 12px; }
  .p-summary .card .cb{ padding:9px 12px; }
  .p-summary .card .big{ padding:4px 0 11px; gap:7px; }
  .p-summary .card .big .bv{ font-size:14px; }
  .p-summary .kv{ padding:5px 0; }
  .p-summary table.rep th{ padding:4px 8px; }
  .p-summary table.rep td{ padding:4.5px 8px; }
  .p-summary .source-bar{ height:30px; }
  .p-summary .col-side .section-label.second{ margin-top:16px; }

  /* light pages: start at top, generous spacing flowing down (not centred) */
  .p-fill .pg-body{ display:flex; flex-direction:column; justify-content:flex-start; gap:38px; padding-top:13mm; }
  .p-fill table.rep th{ padding:9px 8px; }
  .p-fill table.rep td{ padding:10px 8px; }
  .p-fill .section-label{ margin-bottom:13px; }
  .p-fill .note-box{ margin-top:12px; }
  .p-charts .chart-card{ padding:13px 15px; }
  .p-charts .row{ gap:18px; }

  /* Accommodation Bookings — 3 segments side by side */
  .bk-row{ display:flex; gap:16px; align-items:flex-start;}
  .bk-col{ flex:1; min-width:0;}
  .bk-col .ct{ font-size:9px; text-transform:uppercase; letter-spacing:.06em; color:var(--text); font-weight:700; margin-bottom:5px;}
  .bk-col table.rep th{ padding:3px 4px; font-size:6.5px;}
  .bk-col table.rep td{ padding:2.5px 4px; font-size:8px;}
  .bk-col .chart-card{ margin-top:9px; padding:7px 8px;}
  .bk-col .legend{ margin-top:4px; font-size:7px;}


  @media print{
    @page{ size:A4 landscape; margin:0; }
    body{ background:#fff; }
    .toolbar{ display:none !important; }
    .deck{ padding:0; }
    .page{ margin:0; box-shadow:none; }
  }
</style>
</head>

const gbp0=v=>"£"+Math.round(v).toLocaleString("en-GB");
const gbpK=v=>"£"+Math.round(v/1000).toLocaleString("en-GB")+"k";
const gbpK1=v=>"£"+(v/1000).toLocaleString("en-GB",{minimumFractionDigits:1,maximumFractionDigits:1})+"k";
const gbp2=v=>"£"+v.toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct1=v=>(v*100).toFixed(1)+"%";
const pct0=v=>Math.round(v*100)+"%";
const fmtKpi=(v,k)=>(v==null?"—":k.rev?gbpK(v):k.pct?pct1(v):(k.cur?gbp2(v):v));
const fd=v=>(v==null?"—":v.toFixed(1));
function kpiRow(k){ const dm=k.pct?dpp(k.a,k.pm):dpc(k.a,k.pm),dy=k.pct?dpp(k.a,k.py):dpc(k.a,k.py),db=k.pct?dpp(k.a,k.b):dpc(k.a,k.b);
  return `<tr><td class="l">${k.k}${k.sub?` <span class="muted">${k.sub}</span>`:""}</td><td class="strong">${fmtKpi(k.a,k)}</td><td>${fmtKpi(k.pm,k)}</td><td class="${dm.c}">${dm.t}</td><td>${fmtKpi(k.py,k)}</td><td class="${dy.c}">${dy.t}</td><td>${fmtKpi(k.b,k)}</td><td class="${db.c}">${db.t}</td></tr>`; }
function dpp(a,b){ if(a==null||b==null) return {t:"—",c:"muted"}; const d=(a-b)*100; return {t:(d>=0?"+":"−")+Math.abs(d).toFixed(1)+"pp",c:d>=0?"pos":"neg"}; }
function dpc(a,b){ if(a==null||b==null||b===0) return {t:"—",c:"muted"}; const d=(a-b)/b*100; return {t:(d>=0?"+":"−")+Math.abs(d).toFixed(1)+"%",c:d>=0?"pos":"neg"}; }
const sgn=d=>(d>=0?"+":"−")+gbpK(Math.abs(d));

/* ---- charts (grayscale) ---- */
const _MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function barChart(bars,anchor,color){
  const W=320,H=162,padL=28,padR=6,padT=12,padB=26, n=bars.length;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const max=(Math.max(...bars.map(b=>b.v), anchor||0)*1.15)||1, gap=8, colW=(plotW-gap*(n-1))/n;
  const trunc=t=>t.length>12?t.slice(0,11)+"…":t;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  [0,.5,1].forEach(g=>{ const y=padT+plotH-g*plotH; s+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${g===0?'#9AA0A6':'#EDEDEA'}" stroke-width="1"/>`; s+=`<text x="${padL-4}" y="${y+2}" text-anchor="end" font-size="6" fill="#9AA0A6">£${Math.round(g*max)}</text>`; });
  if(anchor!=null){ const ay=padT+plotH-(anchor/max)*plotH; s+=`<line x1="${padL}" y1="${ay}" x2="${W-padR}" y2="${ay}" stroke="#0F4C81" stroke-dasharray="3 3" stroke-width="1"/>`; s+=`<text x="${W-padR}" y="${ay-2}" text-anchor="end" font-size="6.5" fill="#0F4C81">${gbp0(anchor)}</text>`; }
  bars.forEach((b,i)=>{ const x=padL+i*(colW+gap), h=(b.v/max)*plotH, y=padT+plotH-h;
    s+=`<rect x="${x}" y="${y}" width="${colW}" height="${h}" rx="2" fill="${color}"/>`;
    s+=`<text x="${x+colW/2}" y="${y-2}" text-anchor="middle" font-size="6.5" fill="#1A1A1A">${gbp0(b.v)}</text>`;
    s+=`<text x="${x+colW/2}" y="${padT+plotH+8}" text-anchor="middle" font-size="5.5" fill="#6B7280">${trunc(b.l)}</text>`;
    if(b.n!=null) s+=`<text x="${x+colW/2}" y="${padT+plotH+15}" text-anchor="middle" font-size="5.5" fill="#9AA0A6">${b.n} nts</text>`; });
  return s+`</svg>`;
}
function occStack(days){
  const W=580,H=200,padL=24,padR=8,padT=8,padB=24;
  const cols={short:"#7BAFD4",mid:"#50708F",long:"#1E3A57",other:"#BA5A54"};
  const n=days.length, plotW=W-padL-padR, plotH=H-padT-padB, colW=plotW/n;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  [0,.25,.5,.75,1].forEach(g=>{ const y=padT+plotH-g*plotH; s+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${g===0?'#9AA0A6':'#EDEDEA'}" stroke-width="1"/>`; s+=`<text x="${padL-4}" y="${y+2}" text-anchor="end" font-size="6" fill="#9AA0A6">${Math.round(g*100)}%</text>`; });
  let prevMo=null;
  days.forEach((d,i)=>{ const x=padL+i*colW; let y=padT+plotH;
    [["long",d.long],["mid",d.mid],["short",d.short],["other",d.other]].forEach(([k,val])=>{ const hh=Math.min(val,CAP)/CAP*plotH; y-=hh; s+=`<rect x="${x}" y="${y}" width="${Math.max(0.6,colW-0.3)}" height="${hh}" fill="${cols[k]}"/>`; });
    const mo=d.d?d.d.slice(5,7):null;
    if(mo&&mo!==prevMo){ if(prevMo!==null) s+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+plotH}" stroke="#C9C9C4" stroke-width="1" stroke-dasharray="2 2"/>`;
      s+=`<text x="${x+2}" y="${H-7}" text-anchor="start" font-size="7.5" fill="#6B7280" font-weight="600">${_MON[+mo-1]}</text>`; prevMo=mo; } });
  s+=`<line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="#9AA0A6" stroke-width="1"/>`;
  return s+`</svg>`;
}
function bookingsChart(rows,color,weeks){
  const W=320,H=150,padL=6,padR=6,padT=10,padB=20, n=rows.length;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxN=Math.max(...rows.map(r=>r[1]),1)*1.1, maxB=Math.max(...rows.map(r=>r[0]),1)*1.1, maxR=Math.max(...rows.map(r=>r[2]),1)*1.1, slot=plotW/n, bw=slot*0.30;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  s+=`<line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="#9AA0A6" stroke-width="1"/>`;
  rows.forEach((r,i)=>{ const x=padL+i*slot+slot*0.12, hN=(r[1]/maxN)*plotH, hB=(r[0]/maxB)*plotH;
    s+=`<rect x="${x}" y="${padT+plotH-hN}" width="${bw}" height="${hN}" fill="${color}"/>`;
    s+=`<rect x="${x+bw+2}" y="${padT+plotH-hB}" width="${bw}" height="${hB}" fill="${color}" fill-opacity="0.4"/>`;
    if(weeks&&weeks[i]) s+=`<text x="${x+bw}" y="${padT+plotH+9}" text-anchor="middle" font-size="5.5" fill="#6B7280">${weeks[i]}</text>`; });
  const pts=rows.map((r,i)=>{ const x=padL+i*slot+slot/2, y=padT+plotH-(r[2]/maxR)*plotH; return [x,y]; });
  s+=`<polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#C8A66E" stroke-width="1.6"/>`;
  pts.forEach(p=>s+=`<circle cx="${p[0]}" cy="${p[1]}" r="1.6" fill="#C8A66E"/>`);
  return s+`</svg>`;
}

      <thead><tr><th class="l">Line</th>${M.annual.map(r=>`<th>${r.mo}</th>`).join("")}<th>FY Total</th></tr></thead>
      <tbody>
        <tr><td class="l">Revenue</td>${M.annual.map(r=>`<td>${gbpK(r.rev)}${r.otb?'<span class="muted" style="font-size:6.5px"> otb</span>':''}</td>`).join("")}<td class="strong">${gbpK(tA)}</td></tr>
        <tr><td class="l">Budget</td>${M.annual.map(r=>`<td class="muted">${gbpK(r.bud)}</td>`).join("")}<td class="muted">${gbpK(tB)}</td></tr>
        <tr class="sub"><td class="l">± vs Budget</td>${M.annual.map(r=>`<td>${sgn(r.rev-r.bud)}</td>`).join("")}<td>${sgn(tA-tB)}</td></tr>
        <tr><td class="l">Occupancy</td>${M.annual.map(r=>`<td>${r.occ!=null?Math.round(r.occ)+"%":"—"}</td>`).join("")}<td class="strong">${M.fytdOccupancy!=null?Math.round(M.fytdOccupancy)+"%":"—"}</td></tr>
      </tbody>
    </table>
    <div class="note-box">OTB months show business-on-the-books to date; realised months are final actuals (net of VAT).</div>
  </div>`; }

function S_bob(){ return `
  <div class="sec">
    <div class="section-label">Business on the Books &amp; Business Done — by service</div>
    <table class="rep">
      <thead><tr><th class="l">Service</th><th>On the Books</th><th>Business Done (FYTD)</th></tr></thead>
      <tbody>${M.bob.map(r=>`<tr><td class="l"><span class="seg-dot" style="background:${r.dot}"></span>${r.seg}</td><td>${gbpK(r.bob)}</td><td>${gbpK(r.done)}</td></tr>`).join("")}
      <tr class="tot"><td class="l">Total</td><td>${gbpK(M.bob.reduce((s,r)=>s+r.bob,0))}</td><td>${gbpK(M.bob.reduce((s,r)=>s+r.done,0))}</td></tr></tbody>
    </table>
  </div>`; }

function S_pacing(){ const cols=M.pacingCols; const span=cols.length+2; return `
  <div class="sec">
    <div class="section-label">Pacing Report — by Service <span class="sub">revenue · room nights · ADR per service across the FY</span></div>
    <table class="rep pacing">
      <thead><tr><th class="l">Service / Metric</th>${cols.map(c=>`<th>${c}</th>`).join("")}<th>FYTD</th></tr></thead>
      <tbody>
        ${M.pacing.map(p=>`
          <tr class="svc"><td class="l" colspan="${span}">${p.seg}</td></tr>
          <tr><td class="l">Revenue (net)</td>${p.months.map(m=>`<td>${gbpK(m.rev)}</td>`).join("")}<td class="strong">${gbpK(p.totRev)}</td></tr>
          <tr><td class="l">Room Nights</td>${p.months.map(m=>`<td>${m.nights.toLocaleString("en-GB")}</td>`).join("")}<td class="strong">${p.totN.toLocaleString("en-GB")}</td></tr>
          <tr><td class="l">ADR (net)</td>${p.months.map(m=>`<td>${m.adr!=null?gbp0(m.adr):"—"}</td>`).join("")}<td>${p.totAdr!=null?gbp0(p.totAdr):"—"}</td></tr>
          <tr><td class="l muted">Budget Revenue</td>${p.months.map(m=>`<td class="muted">${m.bud?gbpK(m.bud):"—"}</td>`).join("")}<td class="muted">${gbpK(p.totBud)}</td></tr>
          <tr class="varr"><td class="l">Variance £</td>${p.months.map(m=>`<td>${m.bud!=null?sgn(m.rev-m.bud):"—"}</td>`).join("")}<td>${sgn(p.totRev-p.totBud)}</td></tr>
        `).join("")}
      </tbody>
    </table>
  </div>`; }

function S_unit(){ const U=M.unit; return `
  <div class="sec">
    <div class="section-label">Weekly Unit Pacing — rooms by status <span class="sub">(capacity ${CAP})</span></div>
    <table class="rep">
      <thead><tr><th class="l">Status</th>${U.cols.map((c,i)=>`<th${i===0?' style="border-right:2px solid var(--border)"':''}>${c}</th>`).join("")}</tr></thead>
      <tbody>${U.rows.map((rn,ri)=>`<tr><td class="l"><span class="seg-dot" style="background:${U.dots[ri]}"></span>${rn}</td>${U.data[ri].map((v,ci)=>`<td${ci===0?' style="border-right:2px solid var(--border);background:#FAFAFA"':''}>${v} <span class="muted" style="font-size:7.5px">${Math.round(v/CAP*100)}%</span></td>`).join("")}</tr>`).join("")}
      <tr class="tot"><td class="l">Capacity</td>${U.cols.map((c,i)=>`<td${i===0?' style="border-right:2px solid var(--border)"':''}>${CAP}</td>`).join("")}</tr></tbody>
    </table>
    <div class="note-box">Offline = live Mews out-of-order rooms (resourceBlocks). Month column follows the selected month; the 5 weekly columns are forward-from-today. Comp / management folded into Short here only.</div>
  </div>`; }

function S_rateCharts(){ return `
  <div class="sec">
    <div class="section-label">Rate Breakdown by Service</div>
    <div class="row">${M.rateCharts.map(rc=>`<div class="chart-card grow"><div class="ct">${rc.title}</div>${barChart(rc.bars,rc.anchor,rc.color)}</div>`).join("")}</div>
  </div>`; }

function S_occ(){ return `
  <div class="sec">
    <div class="section-label">120-Day Occupancy by Service</div>
    <div class="chart-card">${occStack(M.occDays)}
      <div class="legend">
        <span><span class="seg-dot" style="background:#7BAFD4"></span>Short</span>
        <span><span class="seg-dot" style="background:#50708F"></span>Mid</span>
        <span><span class="seg-dot" style="background:#1E3A57"></span>Long</span>
        <span><span class="seg-dot" style="background:#BA5A54"></span>Other</span>
      </div>
    </div>
  </div>`; }

function bkCol(seg,col,label){ const rows=M.bookings[seg],t=rows.reduce((a,r)=>[a[0]+r[0],a[1]+r[1],a[2]+r[2]],[0,0,0]); return `
  <div class="bk-col">
    <div class="ct"><span class="seg-dot" style="background:${col}"></span>${label}</div>
    <table class="rep"><thead><tr><th class="l">Week</th><th>Bk</th><th>Nights</th><th>Revenue</th><th>ADR</th></tr></thead>
      <tbody>${rows.map((r,i)=>`<tr><td class="l">${M.weeks[i]}</td><td>${r[0]}</td><td>${r[1].toLocaleString("en-GB")}</td><td>${gbpK(r[2])}</td><td>${r[1]>0?gbp0(r[2]/r[1]):"—"}</td></tr>`).join("")}
      <tr class="tot"><td class="l">Total</td><td>${t[0]}</td><td>${t[1].toLocaleString("en-GB")}</td><td>${gbpK(t[2])}</td><td>${t[1]>0?gbp0(t[2]/t[1]):"—"}</td></tr></tbody>
    </table>
    <div class="chart-card">${bookingsChart(rows,col,M.weeks)}
      <div class="legend">
        <span><span class="seg-dot" style="background:${col}"></span>Nights</span>
        <span><span class="seg-dot" style="background:${col};opacity:.45"></span>Bookings</span>
        <span><span class="seg-dot" style="background:#C8A66E"></span>Revenue £</span>
      </div>
    </div>
  </div>`; }

function S_bookings(){ return `
  <div class="sec">
    <div class="section-label">Accommodation Bookings — by segment <span class="sub">bookings by created week</span></div>
    <div class="bk-row">${bkCol("short","#7BAFD4","Short Stay")}${bkCol("mid","#50708F","Mid Stay")}${bkCol("long","#1E3A57","Long Stay")}</div>
  </div>`; }

function S_reservations(){ const agg=M.weeks.map((w,i)=>{ let b=0,n=0,r=0; ["short","mid","long"].forEach(s=>{const x=M.bookings[s][i]; if(x){b+=x[0];n+=x[1];r+=x[2];}}); return [w,b,n,r]; });
  const t=agg.reduce((a,r)=>[a[0]+r[1],a[1]+r[2],a[2]+r[3]],[0,0,0]); return `
  <div class="sec">
    <div class="section-label">Reservations Created — all segments</div>
    <table class="rep">
      <thead><tr><th class="l">Week created</th><th>Bookings</th><th>Room nights</th><th>Revenue</th><th>Avg ADR</th></tr></thead>
      <tbody>${agg.map(r=>`<tr><td class="l">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${gbpK(r[3])}</td><td>${gbp0(r[3]/r[2])}</td></tr>`).join("")}
      <tr class="tot"><td class="l">Total</td><td>${t[0]}</td><td>${t[1]}</td><td>${gbpK(t[2])}</td><td>${gbp0(t[2]/t[1])}</td></tr></tbody>
    </table>
    <div class="note-box">A week with a new long-stay booking spikes revenue (full contract value lands in its created-week). Capture cutoff 11:00 local.</div>
  </div>`; }

function S_amenity(){ const tA=M.amenity.reduce((s,r)=>s+r.rev,0),tB=M.amenity.reduce((s,r)=>s+r.bud,0); return `
  <div class="sec">
    <div class="section-label">Amenity &amp; Building Revenue — ${M.period}</div>
    <table class="rep">
      <thead><tr><th class="l">Amenity</th><th>Revenue</th><th>Budget</th><th>vs Budget</th></tr></thead>
      <tbody>${M.amenity.map(r=>`<tr><td class="l">${r.a}</td><td>${gbp0(r.rev)}</td><td class="muted">${gbp0(r.bud)}</td><td>${dpc(r.rev,r.bud).t}</td></tr>`).join("")}
      <tr class="tot"><td class="l">Total</td><td>${gbp0(tA)}</td><td>${gbp0(tB)}</td><td>${dpc(tA,tB).t}</td></tr></tbody>
    </table>
    <div class="note-box">Westbourne only — amenity revenue runs on Toast etc. (outside Mews), uploaded weekly. Page omitted for properties with no ancillary.</div>
  </div>`; }

/* ============ PAGES ============ */
const PAGES=[
  { title:"Summary",                 cls:"p-summary", body:S_summary },
  { title:"Annualised & Budget",     cls:"p-fill", body:()=>S_annual()+S_bob() },
  { title:"Pacing Report",           body:S_pacing },
  { title:"Unit Pacing & Rates",     cls:"p-fill p-charts", body:()=>S_unit()+S_rateCharts() },
  { title:"Occupancy & Reservations",cls:"p-fill", body:()=>S_occ()+S_reservations() },
  { title:"Accommodation Bookings",  body:S_bookings },
  { title:"Amenity & Building",      cls:"p-fill", body:S_amenity },
];

function pageFrame(p,idx,total){ return `
  <div class="page ${p.cls||''}">
    <div class="pg-header">
      <img class="mf-logo" src="${LOGO}" alt="Mason & Fifth">
      <span class="rl">SALES FLASH<small>${p.title} · ${M.period}</small></span>
    </div>
    <div class="pg-body">${p.body()}</div>
    <div class="pg-footer"><span>${M.property} · ${M.period}</span><span class="powered">Powered by <b>Market&nbsp;Pulse</b></span><span>Page ${idx+1} of ${total}</span></div>
  </div>`; }

window.renderReport = async function(data){
  try {
    M = data;
    CAP = (M && M.cap) || 331;
    var pages = PAGES.filter(function(p){ return p.title !== "Amenity & Building" || (M.amenity && M.amenity.length); });
    document.getElementById("deck").innerHTML = pages.map(function(p,i){ return pageFrame(p,i,pages.length); }).join("");
    if (document.fonts && document.fonts.ready) { try { await Promise.race([document.fonts.ready, new Promise(function(r){ setTimeout(r,1500); })]); } catch(e){} }
    document.body.classList.add("ready");
  } catch(e){ console.error("renderReport:", e); document.body.classList.add("ready"); }
};
document.body.classList.add("script-ready");
</script>
</body>
</html>
