
  <!DOCTYPE html>
  <html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link 
      rel="icon" 
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path d='M 16 4 L 28 16 L 16 28 L 4 16 Z' fill='%23faff6a'/></svg>"
    >
  </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <script>
        // Auto-refresh on stale deploy: if the JS bundle 404s after a deploy,
        // the #root stays empty. Detect this and reload once to pick up new HTML.
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.children.length === 0 && !sessionStorage.getItem('_mp_reloaded')) {
            sessionStorage.setItem('_mp_reloaded', '1');
            window.location.reload();
          } else {
            sessionStorage.removeItem('_mp_reloaded');
          }
        }, 3000);
      </script>
    </body>
  </html>
