
  <!DOCTYPE html>
  <html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>( MARKET PULSE )</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  </head>

    <body style="background-color: #14181D;">
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <script>
        // Auto-refresh on stale deploy: if the JS bundle 404s after a deploy,
        // the #root stays empty. Detect this and reload once to pick up new HTML.
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.children.length === 0 && !sessionStorage.getItem('_mp_reloaded')) {
            sessionStorage.setItem('_mp_reloaded', '1');
            window.location.reload();
          } else {
            sessionStorage.removeItem('_mp_reloaded');
          }
        }, 3000);
      </script>
    </body>
  </html>
